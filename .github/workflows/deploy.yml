name: 🚀 Deploy Theme — Nieto & Nieto Lawyers

on:
  push:
    branches: [ main ]
    paths:
      - 'wp-content/themes/nieto-lawyers-theme/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy-theme:
    name: Deploy theme to Namecheap
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📤 SFTP — Sincronizar theme
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./wp-content/themes/nieto-lawyers-theme/
          server-dir: /arasaka.sergioduran.dev/nuevo-nieto-lawyers1/wp-content/themes/nieto-lawyers-theme/
          exclude: |
            **/.git*
            .gitignore
            memory/